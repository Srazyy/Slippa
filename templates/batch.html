{% extends "base.html" %}
{% block title %}Batch Processing — Slippa{% endblock %}

{% block content %}
<div class="card">
    <h2>Batch Processing</h2>
    <p class="subtitle">Paste multiple YouTube URLs (one per line) to process them all at once</p>

    <form id="batch-form">
        <textarea id="urls-input" class="textarea" rows="6" placeholder="https://www.youtube.com/watch?v=abc123
https://www.youtube.com/watch?v=def456
https://www.youtube.com/watch?v=ghi789"></textarea>
        <button type="submit" class="btn-primary" id="batch-btn" style="margin-top: 16px; width: 100%;">
            🚀 Process All Videos
        </button>
    </form>
</div>

<div class="hidden" id="batch-progress">
    <div class="results-header">
        <h2>Batch Progress</h2>
        <span class="status-text" id="batch-status">Starting...</span>
    </div>
    <div id="batch-jobs" class="batch-grid"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const batchForm = document.getElementById('batch-form');
    const batchProgress = document.getElementById('batch-progress');
    const batchJobs = document.getElementById('batch-jobs');
    const batchStatus = document.getElementById('batch-status');

    batchForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const urls = document.getElementById('urls-input').value.trim();
        if (!urls) return;

        document.getElementById('batch-btn').disabled = true;
        document.getElementById('batch-btn').textContent = '⏳ Processing...';
        batchProgress.classList.remove('hidden');

        const res = await fetch('/batch-process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `urls=${encodeURIComponent(urls)}`
        });
        const data = await res.json();
        if (data.error) { batchStatus.textContent = data.error; return; }

        // Show job cards with staggered animation
        batchJobs.innerHTML = '';
        const sseStreams = [];

        data.job_ids.forEach((id, i) => {
            const card = document.createElement('div');
            card.className = 'batch-card';
            card.id = `batch-${id}`;
            card.style.setProperty('--delay', `${i * 60}ms`);
            card.innerHTML = `
            <div class="batch-card-header">
                <span class="batch-num">#${i + 1}</span>
                <span class="batch-card-status" id="bstatus-${id}">⏳ Queued</span>
            </div>
            <p class="batch-card-title" id="btitle-${id}">Waiting...</p>
            <p class="batch-card-progress" id="bprog-${id}">—</p>
            <div class="progress-bar-container" style="margin: 8px 0 0;">
                <div class="progress-bar-track" style="height: 4px;">
                    <div class="progress-bar-fill" id="bfill-${id}" style="width: 0%"></div>
                </div>
            </div>
        `;
            batchJobs.appendChild(card);
        });

        // Track completion with SSE per job
        let done = 0;
        const total = data.job_ids.length;
        batchStatus.textContent = `0 / ${total} complete`;

        data.job_ids.forEach(id => {
            const es = new EventSource(`/stream/${id}`);
            sseStreams.push(es);

            es.onmessage = (event) => {
                const j = JSON.parse(event.data);
                const statusEl = document.getElementById(`bstatus-${id}`);
                const titleEl = document.getElementById(`btitle-${id}`);
                const progEl = document.getElementById(`bprog-${id}`);
                const cardEl = document.getElementById(`batch-${id}`);
                const fillEl = document.getElementById(`bfill-${id}`);

                if (j.video_title && titleEl) titleEl.textContent = j.video_title;
                if (progEl) progEl.textContent = j.progress;
                if (fillEl) fillEl.style.width = (j.percent || 0) + '%';

                if (j.status === 'done') {
                    es.close();
                    done++;
                    if (statusEl) statusEl.textContent = `✅ ${j.clips?.length || 0} clips`;
                    if (cardEl) cardEl.classList.add('batch-done');
                    if (j.clips?.length > 0 && titleEl) {
                        titleEl.innerHTML = `<a href="/results/${id}" class="batch-link">${j.video_title} →</a>`;
                    }
                    batchStatus.textContent = `${done} / ${total} complete`;
                    if (done === total) {
                        batchStatus.textContent = `All ${total} videos processed!`;
                        document.getElementById('batch-btn').disabled = false;
                        document.getElementById('batch-btn').textContent = '🚀 Process All Videos';
                    }
                } else if (j.status === 'error') {
                    es.close();
                    done++;
                    if (statusEl) statusEl.textContent = '❌ Error';
                    if (cardEl) cardEl.classList.add('batch-error');
                    batchStatus.textContent = `${done} / ${total} complete`;
                    if (done === total) {
                        batchStatus.textContent = `All ${total} videos processed!`;
                        document.getElementById('batch-btn').disabled = false;
                        document.getElementById('batch-btn').textContent = '🚀 Process All Videos';
                    }
                } else if (j.status !== 'queued') {
                    if (statusEl) statusEl.textContent = '🔄 Processing';
                    if (cardEl) {
                        cardEl.classList.remove('batch-done', 'batch-error');
                        cardEl.classList.add('batch-active');
                    }
                }
            };

            es.onerror = () => {
                es.close();
            };
        });
    });
</script>
{% endblock %}
